# CANONICAL REGISTRY
# This file (.harness-eng/templates/big-picture/design-registry.yaml) is maintained by the harness.
# It is updated automatically during /h:upgrade-harness.
# Do NOT add project-specific UI systems here.
# Instead, add them to the local project registry: .harness-eng/design-registry.yaml
design_registry:
  systems:
    - id: oat
      use_for: ["simple apps", "server-rendered apps", "internal tools", "vanilla HTML", "low-dependency dashboards"]
      strengths: ["semantic HTML", "zero dependencies", "tiny CSS/JS", "minimal class pollution", "simple theming"]
      avoid_for: ["highly branded consumer apps", "complex custom interactions", "large design-system-heavy products"]
      extract:
        - "semantic HTML-first component patterns"
        - "minimal CSS variable theming"
        - "basic app components without framework lock-in"
        - "simple accessible defaults"
      docs:
        home: "https://oat.ink/"
        components: "https://oat.ink/components/"

    - id: shadcn
      use_for: ["React + Tailwind already present", "modern SaaS", "dashboards", "forms", "fast implementation"]
      strengths: ["component registry", "blocks", "semantic CSS tokens", "Tailwind-friendly", "agent-friendly docs"]
      avoid_for: ["projects without Tailwind", "simple server-rendered apps", "low-dependency targets"]
      extract:
        - "semantic theme tokens"
        - "component composition patterns"
        - "form/table/dialog/sheet patterns"
      docs:
        components: "https://ui.shadcn.com/docs/components"
        theming: "https://ui.shadcn.com/docs/theming"

    - id: radix-themes
      use_for: ["accessible app UI", "disciplined visual foundations", "neutral product interfaces"]
      strengths: ["theme tokens", "color scales", "typography", "spacing", "breakpoints", "accessible primitives"]
      avoid_for: ["simple pages where native controls and CSS are enough"]
      extract:
        - "typography scale"
        - "accent/gray/radius/scaling model"
        - "component behavior and accessibility expectations"
      docs:
        getting_started: "https://www.radix-ui.com/themes/docs/overview/getting-started"
        color: "https://www.radix-ui.com/themes/docs/theme/color"
        typography: "https://www.radix-ui.com/themes/docs/theme/typography"

    - id: carbon
      use_for: ["enterprise dashboards", "admin tools", "data-heavy workflows", "B2B operations"]
      strengths: ["information architecture", "patterns", "accessibility", "data density", "multi-framework components"]
      avoid_for: ["small apps", "consumer branded apps", "projects where full enterprise design-system weight is unjustified"]
      extract:
        - "dashboard and admin patterns"
        - "table/filter/search behaviors"
        - "enterprise accessibility and content guidance"
      docs:
        home: "https://carbondesignsystem.com/"

    - id: fluent2
      use_for: ["business apps", "productivity tools", "Microsoft ecosystem", "internal tools"]
      strengths: ["cross-platform components", "Figma kits", "accessibility resources", "focus/contrast guidance"]
      avoid_for: ["small apps", "non-Microsoft visual direction", "projects where full productivity-suite patterns are unnecessary"]
      extract:
        - "productivity app navigation"
        - "command/action patterns"
        - "accessibility review practices"
      docs:
        home: "https://www.fluentui.dev/"

    - id: shadcn-svelte
      use_for: ["Svelte/SvelteKit apps", "projects using Tailwind", "dashboards", "forms"]
      strengths: ["copy-paste components (own your code)", "accessible primitives via Bits UI/Melt UI", "Tailwind styling", "highly customizable"]
      avoid_for: ["projects without Tailwind", "vanilla HTML/JS", "projects wanting a traditional npm package component library"]
      extract:
        - "semantic theme tokens"
        - "accessible component behaviors (from Bits UI)"
        - "form/table/dialog/sheet patterns"
      docs:
        components: "https://www.shadcn-svelte.com/docs/components"
        bits_ui: "https://bits-ui.com/docs/introduction"

    - id: web.dev-patterns
      use_for: ["any web project", "reference for best practices", "accessibility guidelines", "responsive design"]
      strengths: ["backed by Chrome/Google developers", "performance-focused", "Core Web Vitals alignment", "UX patterns for forms and permissions"]
      avoid_for: ["off-the-shelf component needs (this is a guide, not a library)"]
      extract:
        - "responsive UI patterns (fluid layouts without breakpoints)"
        - "accessible forms and permission flows"
        - "UX patterns that protect Core Web Vitals"
      docs:
        patterns: "https://web.dev/patterns/"
        css_ui: "https://developer.chrome.com/docs/css-ui/"
